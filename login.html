<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input{
width:100%;
padding:12px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Object Detection For Blind</h2>

<form action="dashboard.html">
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</body>
</html>
